<section class="login-section" id="main-content">
  <div class="login-wrapper">

    <!-- ===== LEFT: Security Illustration ===== -->
    <div class="login-illustration" aria-hidden="true">
      <div class="illustration-bg-circle"></div>
      <img
        src="assets/security-illustration.png"
        alt="Security Illustration"
        class="illustration-img"
        loading="lazy"
      />
      <div class="illustration-dots top-dots"></div>
      <div class="illustration-dots bottom-dots"></div>
    </div>

    <!-- ===== RIGHT: Login Card ===== -->
    <div class="login-card-wrapper">
      <div class="login-card">

        <!-- Avatar Icon -->
        <div class="user-avatar">
          <svg viewBox="0 0 24 24" fill="white" width="28" height="28">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>

        <h1 class="login-title">Welcome Back!</h1>
        <p class="login-subtitle">Login to continue to your account</p>

        <!-- Decorative underline -->
        <div class="title-underline">
          <span class="underline-orange"></span>
          <span class="underline-blue"></span>
          <span class="underline-green"></span>
        </div>

        <!-- Error Message -->
        @if (loginError) {
          <div class="error-banner" role="alert">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            {{ loginError }}
          </div>
        }

        <!-- Login Form -->
        <form class="login-form" (ngSubmit)="onLogin()" novalidate>

          <!-- Login ID -->
          <div class="form-group">
            <label for="loginId" class="form-label">Login Id <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                  <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
              </span>
              <input
                id="loginId"
                type="text"
                class="form-input"
                placeholder="Enter your Login Id"
                [(ngModel)]="loginId"
                name="loginId"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password" class="form-label">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                  <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
              </span>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                class="form-input"
                placeholder="Enter your Password"
                [(ngModel)]="password"
                name="password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-password" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                @if (showPassword) {
                  <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                  </svg>
                } @else {
                  <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                    <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.8 11.8 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Captcha -->
          <div class="form-group">
            <label for="captchaInput" class="form-label">Captcha <span class="required">*</span></label>
            <div class="captcha-row">
              <div class="captcha-display" [attr.aria-label]="'CAPTCHA: ' + captchaValue">
                {{ captchaValue }}
              </div>
              <input
                id="captchaInput"
                type="text"
                class="form-input captcha-input"
                [class.captcha-error]="captchaError"
                placeholder="Enter Captcha"
                [(ngModel)]="captchaInput"
                name="captchaInput"
                autocomplete="off"
                required
              />
              <button type="button" class="refresh-captcha" (click)="generateCaptcha()" title="Refresh CAPTCHA" aria-label="Refresh CAPTCHA">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                  <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Mandatory note -->
          <p class="mandatory-note">( All Fields marked with * are mandatory )</p>

          <!-- Forgot Password -->
          <div class="forgot-row">
            <button type="button" class="forgot-link" (click)="onForgotPassword()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/>
              </svg>
              Forgot Password?
            </button>
          </div>

          <!-- Action Buttons -->
          <div class="btn-row">
            <button type="submit" class="btn-login" [disabled]="isLoading" id="loginSubmitBtn">
              @if (isLoading) {
                <span class="spinner"></span>
                <span>Logging in...</span>
              } @else {
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                  <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
                </svg>
                Login
              }
            </button>
            <button type="button" class="btn-cancel" (click)="onCancel()" id="loginCancelBtn">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
              Cancel
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</section>
